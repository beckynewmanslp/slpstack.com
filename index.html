function selMode(m){mode=m==='dm'?'dm':'player';if(m==='dm'){loadDM();screen=dmParty.length?'dm-map':'dm-setup';}else{loadP();screen=pData?'p-hub':'p-create';}render();}

// ===== DM SETUP =====
function rDMSetup(){
  let h=`<div class="center" style="padding-top:14px;margin-bottom:14px"><div style="font-size:32px">🏰</div><h1 class="title" style="font-size:24px">Build Your Council</h1></div><div class="card"><h2 class="section">🎭 Add Heroes</h2>`;
  dmParty.forEach((p,i)=>{h+=`<div class="flex gap-12 mb-8" style="align-items:center"><span style="font-size:20px">${p.e}</span><span style="font-weight:700;font-size:14px">${esc(p.n)}</span><span style="color:${p.c};font-size:11px;font-weight:700">${p.cl}</span><button class="btn-outline" style="margin-left:auto;padding:3px 10px;font-size:10px;color:var(--red);border-color:rgba(217,83,79,.2)" onclick="dmParty.splice(${i},1);saveDM();render()">✕</button></div>`;});
  if(dmParty.length<8){h+=`<div class="flex gap-8 mt-8 wrap" style="align-items:flex-end"><div style="flex:1;min-width:120px"><label>Name</label><input type="text" class="small-input" id="nn" placeholder="Name..." maxlength="20" style="padding:8px 10px;font-size:13px"></div><div style="flex:2;min-width:220px"><label>Class</label><div class="flex gap-8 wrap">${CL.map((c,i)=>`<button class="btn-outline" style="padding:4px 9px;font-size:10px;border-color:${selClass===i?c.color:'rgba(255,255,255,.1)'};color:${selClass===i?c.color:'var(--gold)'}" onclick="selClass=${i};render()">${c.emoji} ${c.name}</button>`).join('')}</div></div></div><button class="btn btn-sm mt-12" style="width:auto" onclick="addM()">+ Add</button>`;}
  h+=`</div>`;if(dmParty.length>=1)h+=`<button class="btn mt-8" onclick="screen='dm-map';render()">Enter the Shadow Council 🌑</button>`;return h;
}
function addM(){const inp=document.getElementById('nn');const name=inp?.value?.trim();if(!name||selClass===null)return;const c=CL[selClass];dmParty.push({n:name,cl:c.name,e:c.emoji,c:c.color,xp:0,cq:[],sp:{}});saveDM();selClass=null;render();}

// ===== DM MAP =====
function rDMMap(){
  let h=`<div class="flex gap-12 mb-12 wrap" style="justify-content:space-between"><div class="flex gap-12"><span style="font-size:26px">🏰</span><div><h1 class="title" style="font-size:20px;text-align:left;margin:0">Shadow Council</h1><p style="font-size:10px;color:var(--dim)">Campaign Map · ${dmProgress}/${MAP.length} nodes cleared</p></div></div><div class="flex gap-8"><button class="btn-outline" style="font-size:10px;padding:4px 10px" onclick="screen='dm-setup';render()">⚙️ Party</button><button class="reset-btn" onclick="resetDM()">🗑️ Reset</button></div></div>`;

  // Party bar
  h+=`<div class="card" style="padding:14px"><div class="flex gap-12 wrap">`;
  dmParty.forEach(p=>{const lv=getLv(p.xp);h+=`<div class="party-member" style="padding:10px"><div class="flex gap-8"><span style="font-size:18px">${p.e}</span><div><div style="font-size:13px;font-weight:800">${esc(p.n)}</div><div style="font-size:9px;color:${p.c};font-weight:700">Lv.${lv} ${LVL_N[lv]}</div></div></div><div class="xp-track mt-8" style="height:8px"><div class="xp-fill" style="width:${xpPct(p.xp)}%;background:${p.c}"></div></div></div>`;});
  h+=`</div></div>`;

  // MAP
  h+=`<div class="card" style="padding:14px"><h2 class="section">🗺️ Quest Map</h2><div class="map-wrap"><div class="map-inner">`;

  // Region labels
  REGIONS.forEach((r,i)=>{
    const y=[6,24,42,60,78][i];
    const x=i%2===0?88:2;
    h+=`<div class="region-label" style="left:${x}%;top:${y}%;${i%2===0?'text-align:right':''}writing-mode:${i%2===0?'vertical-rl':'vertical-lr'}">${r.name}</div>`;
  });

  // SVG paths
  h+=`<svg class="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none">`;
  for(let i=0;i<MAP.length-1;i++){
    const a=MAP[i],b=MAP[i+1];
    const st=nodeStatus(i);
    const col=st==='done'?'rgba(212,175,55,.4)':st==='current'?'rgba(212,175,55,.25)':'rgba(255,255,255,.06)';
    h+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${col}" stroke-width=".6" stroke-linecap="round"/>`;
  }
  h+=`</svg>`;

  // Nodes
  MAP.forEach((nd,i)=>{
    const st=nodeStatus(i);
    const content=nodeContent(i);
    const title=content?content.kind==='boss'?content.data.emoji:nodeTitle(i):'?';
    const dotCls=nd.type==='boss'?'node-dot boss-dot':'node-dot quest-dot';
    const extraCls=st==='done'?' done':st==='current'?' current':'';
    const click=st!=='locked'?`onclick="mapClick(${i})"`:''
    const label=content?content.kind==='boss'?content.data.name:content.data.title:'';
    const labelCls=st==='current'?'node-label current-label':'node-label';
    h+=`<div class="map-node${st==='locked'?' locked':''}" style="left:${nd.x}%;top:${nd.y}%" ${click}><div class="${dotCls}${extraCls}">${nd.type==='boss'?(content?content.data.emoji:'💀'):(st==='done'?'✓':(i+1))}</div><div class="${labelCls}">${label.length>18?label.substring(0,16)+'…':label}</div></div>`;
  });

  // Party token at current position
  if(dmProgress<MAP.length){
    const cur=MAP[dmProgress];
    h+=`<div class="party-token" style="left:${cur.x}%;top:${cur.y-7}%">${dmParty.map(p=>p.e).join('')}</div>`;
  }

  h+=`</div></div></div>`;

  // Current quest info
  if(dmProgress<MAP.length){
    const cur=nodeContent(dmProgress);
    if(cur){
      const isBoss=cur.kind==='boss';
      h+=`<div class="card glow" style="text-align:center;padding:20px"><div style="font-size:${isBoss?'36':'28'}px;margin-bottom:8px">${isBoss?cur.data.emoji:'⚔️'}</div><h3 class="quest-title" style="margin-bottom:6px">${isBoss?cur.data.name:cur.data.title}</h3>`;
      if(isBoss){h+=`<p style="font-size:13px;color:var(--dim);margin-bottom:14px">${cur.data.desc}</p><button class="btn btn-red btn-sm" style="font-size:15px;padding:14px 40px;width:auto" onclick="startBoss(${dmProgress})">⚔️ FIGHT THE BOSS ⚔️</button>`;}
      else{
        const tb=cur.data.type==='coop'?' <span class="badge-coop">🤝 CO-OP</span>':cur.data.type==='gray'?' <span class="badge-gray">⚖️ GRAY</span>':'';
        h+=`<div class="badge mb-8">${cur.data.skill}</div>${tb}<p style="font-size:13px;color:var(--dim);margin:10px 0">${cur.data.story.substring(0,120)}...</p><button class="btn btn-sm btn-orange" style="font-size:15px;padding:14px 40px;width:auto" onclick="startQuest(${dmProgress})">Begin Quest →</button>`;
      }
      h+=`</div>`;
    }
  }else{
    h+=`<div class="card glow center" style="padding:30px"><div style="font-size:48px;margin-bottom:12px">👑🎉👑</div><h3 class="quest-title" style="color:var(--green)">CAMPAIGN COMPLETE!</h3><p style="color:var(--dim);font-size:14px">Your council has conquered the Shadow Throne.</p></div>`;
  }
  return h;
}

function mapClick(idx){
  const st=nodeStatus(idx);if(st==='locked')return;
  const c=nodeContent(idx);if(!c)return;
  if(st==='done'){/* allow replay for review */}
  if(c.kind==='boss')startBoss(idx);else startQuest(idx);
}
function startQuest(idx){const c=nodeContent(idx);dmCur={idx,quest:c.data};dmPhase='story';dmAnswers={};screen='dm-quest';render();window.scrollTo(0,0);}
function startBoss(idx){const c=nodeContent(idx);dmCur={idx,boss:c.data};dmPhase='intro';dmBossRound=0;dmBossWins=0;dmAnswers={};screen='dm-boss';render();window.scrollTo(0,0);}

// ===== DM QUEST (same as before, simplified) =====
function rDMQuest(){
  const q=dmCur.quest;const phases=['story','scenario','choices','reveal','discussion'];const labels={story:'📖',scenario:'🎭',choices:'🤔',reveal:'✨',discussion:'💬'};
  let h=`<button class="btn-outline mb-12" onclick="screen='dm-map';render()">← Map</button>`;
  const tb=q.type==='coop'?'<span class="badge-coop" style="margin-left:6px">🤝</span>':q.type==='gray'?'<span class="badge-gray" style="margin-left:6px">⚖️</span>':'';
  h+=`<div class="flex gap-8 mb-12 wrap" style="justify-content:space-between"><div><div class="badge mb-4">${q.skill}</div>${tb}<h3 class="quest-title" style="margin-top:6px;margin-bottom:0">${q.title}</h3></div><div class="flex gap-4 wrap">${phases.map(p=>`<button class="chip ${dmPhase===p?'active':''}" onclick="dmPhase='${p}';render()">${labels[p]}</button>`).join('')}</div></div>`;

  if(dmPhase==='story'){h+=`<div class="card glow" style="padding:32px 24px"><p class="dm-story">${q.story}</p><div class="center mt-20"><button class="btn btn-sm btn-orange" style="width:auto;padding:12px 28px" onclick="dmPhase='scenario';render()">Continue →</button></div></div>`;}
  else if(dmPhase==='scenario'){h+=`<div class="card glow" style="padding:32px 24px"><h2 class="section center" style="color:var(--orange)">🎭 The Situation</h2><p class="dm-scenario mt-12">${q.scenario}</p>${q.type==='coop'?'<div class="coop-box mt-12"><strong style="color:var(--blue)">🤝 Discuss together before answering.</strong></div>':''}<div class="center mt-20"><button class="btn btn-sm btn-purple" style="width:auto;padding:12px 28px" onclick="dmPhase='choices';render()">Show Choices →</button></div></div>`;}
  else if(dmPhase==='choices'){
    h+=`<div class="card"><h2 class="section center">What's your move?</h2>${q.choices.map((c,i)=>`<div class="dm-choice-display"><span class="letter">${'ABC'[i]}.</span>${esc(c.text)}</div>`).join('')}</div>`;
    h+=`<div class="card"><h2 class="section">📋 Answers</h2>${dmParty.map((p,pi)=>`<div class="flex gap-12 mb-8"><div class="flex gap-8" style="min-width:100px"><span style="font-size:16px">${p.e}</span><span style="font-weight:700;font-size:12px">${esc(p.n)}</span></div><div class="flex gap-8">${q.choices.map((c,ci)=>{const sel=dmAnswers[pi]===ci;let cls='answer-btn';if(sel)cls+=c.rating==='best'?' best-mark':c.rating==='partial'?' partial-mark':' wrong-mark';return`<button class="${cls}" onclick="dmAnswers[${pi}]=${dmAnswers[pi]===ci?'undefined':ci};render()">${'ABC'[ci]}</button>`;}).join('')}</div></div>`).join('')}<div class="center mt-12"><button class="btn btn-sm btn-green" style="width:auto;padding:12px 28px" onclick="revealQ()">✨ Reveal ✨</button></div></div>`;
  }
  else if(dmPhase==='reveal'){
    h+=`<div class="card glow"><div class="big-reveal">Results</div>${q.choices.map((c,i)=>{let cls='dm-choice-display';if(c.rating==='best')cls+=' best-reveal';else if(c.rating==='partial')cls+=' partial-reveal';else cls+=' wrong-reveal';const tag=c.rating==='best'?` <span style="color:var(--green);font-weight:800">✅ ${c.xp} XP</span>`:c.rating==='partial'?` <span style="color:var(--yellow);font-weight:800">🔶 ${c.xp} XP</span>`:` <span style="color:var(--red);font-weight:800">❌ 0</span>`;return`<div class="${cls}"><span class="letter">${'ABC'[i]}.</span>${esc(c.text)}${tag}<div style="margin-top:6px;font-size:12px;color:#b8a890;border-top:1px solid rgba(255,255,255,.05);padding-top:6px">${c.feedback}</div></div>`;}).join('')}${q.grayNote?`<div class="gray-note"><strong style="color:var(--purple)">⚖️</strong> ${q.grayNote}</div>`:''}</div>`;
    h+=`<div class="center mt-8"><button class="btn btn-sm btn-orange" style="width:auto;padding:12px 28px" onclick="dmPhase='discussion';render()">💬 Discuss →</button></div>`;
  }
  else if(dmPhase==='discussion'){
    h+=`<div class="card glow" style="padding:28px"><h2 class="section center" style="color:var(--orange)">💬 Discussion</h2><p style="font-size:16px;line-height:1.7;text-align:center;font-style:italic;margin-top:10px">"${q.discussion}"</p>${q.coopNote?`<div class="coop-box mt-12"><p style="font-size:12px;line-height:1.6;color:var(--text);margin:0">${q.coopNote}</p></div>`:''}<div class="center mt-20"><button class="btn btn-sm" style="width:auto;padding:12px 28px" onclick="finishNode()">Complete & Return →</button></div></div>`;
  }
  return h;
}
function revealQ(){
  const q=dmCur.quest;dmParty.forEach((p,i)=>{const ans=dmAnswers[i];if(ans!==undefined){const ch=q.choices[ans];const ol=getLv(p.xp);p.xp+=ch.xp;if(!p.cq.includes(q.id))p.cq.push(q.id);if(ch.rating!=='wrong')p.sp[q.skill]=(p.sp[q.skill]||0)+1;if(getLv(p.xp)>ol)setTimeout(()=>showOL(p,getLv(p.xp)),800);}});saveDM();dmPhase='reveal';render();window.scrollTo(0,0);
}
function finishNode(){if(dmCur.idx===dmProgress)dmProgress++;saveDM();dmCur=null;screen='dm-map';render();window.scrollTo(0,0);}

// ===== DM BOSS =====
function rDMBoss(){
  const b=dmCur.boss;
  let h=`<button class="btn-outline mb-12" onclick="screen='dm-map';render()">← Retreat to Map</button>`;

  if(dmPhase==='intro'){
    h+=`<div class="card glow" style="padding:36px;text-align:center"><div style="font-size:64px;margin-bottom:10px">${b.emoji}</div><h3 class="quest-title" style="font-size:28px;color:var(--red)">${b.name}</h3><p style="font-size:16px;color:var(--dim);margin:12px 0;font-style:italic">${b.desc}</p><div style="font-size:13px;color:var(--dim);margin-bottom:20px">3 rounds · Win 2 to defeat · XP earned each round</div><button class="btn btn-red btn-sm" style="font-size:16px;padding:14px 40px;width:auto" onclick="dmPhase='round';dmBossRound=0;render()">⚔️ BEGIN BATTLE ⚔️</button></div>`;
    return h;
  }

  // Round indicators
  const roundInd=Array.from({length:3},(_, i)=>{
    let cls='round-indicator';
    if(i<dmBossRound){cls+=dmBossRoundResults&&dmBossRoundResults[i]?' won':' lost';}
    else if(i===dmBossRound)cls+=' current';
    return`<span class="${cls}">${i+1}</span>`;
  }).join('');

  // Boss HP bar (starts at 3, loses 1 per round won)
  const hpPct=Math.max(0,((3-dmBossWins)/3)*100);

  h+=`<div class="card"><div class="flex gap-12" style="justify-content:space-between"><div class="flex gap-8"><span style="font-size:28px">${b.emoji}</span><div><div style="font-family:'Cinzel',serif;font-size:18px;color:var(--red);font-weight:700">${b.name}</div><div style="font-size:11px;color:var(--dim)">Rounds: ${roundInd}</div></div></div><div style="text-align:right"><div style="font-size:11px;color:var(--dim)">Wins: ${dmBossWins}/3</div></div></div><div class="boss-hp"><div class="boss-hp-fill" style="width:${hpPct}%"></div></div></div>`;

  if(dmPhase==='round'){
    const rd=b.rounds[dmBossRound];
    h+=`<div class="card glow" style="padding:28px"><h2 class="section center" style="color:var(--red)">⚔️ Round ${dmBossRound+1} of 3</h2><p class="dm-scenario mt-12">${rd.scenario}</p></div>`;
    h+=`<div class="card"><h2 class="section">Choices</h2>${rd.choices.map((c,i)=>`<div class="dm-choice-display"><span class="letter">${'ABC'[i]}.</span>${esc(c.text)}</div>`).join('')}</div>`;
    h+=`<div class="card"><h2 class="section">📋 Answers</h2>${dmParty.map((p,pi)=>`<div class="flex gap-12 mb-8"><div class="flex gap-8" style="min-width:100px"><span style="font-size:16px">${p.e}</span><span style="font-weight:700;font-size:12px">${esc(p.n)}</span></div><div class="flex gap-8">${rd.choices.map((c,ci)=>{const sel=dmAnswers[pi]===ci;let cls='answer-btn';if(sel)cls+=c.rating==='best'?' best-mark':c.rating==='partial'?' partial-mark':' wrong-mark';return`<button class="${cls}" onclick="dmAnswers[${pi}]=${dmAnswers[pi]===ci?'undefined':ci};render()">${'ABC'[ci]}</button>`;}).join('')}</div></div>`).join('')}<div class="center mt-12"><button class="btn btn-sm btn-green" style="width:auto;padding:12px 28px" onclick="revealBossRound()">✨ Reveal Round ${dmBossRound+1} ✨</button></div></div>`;
  }
  else if(dmPhase==='round-reveal'){
    const rd=b.rounds[dmBossRound];
    const anyBest=Object.values(dmAnswers).some(a=>a!==undefined&&rd.choices[a]?.rating==='best');
    const roundWon=anyBest;
    h+=`<div class="card glow"><div class="big-reveal" style="color:${roundWon?'var(--green)':'var(--red)'}">${roundWon?'✅ Round Won!':'❌ Round Lost!'}</div>${rd.choices.map((c,i)=>{let cls='dm-choice-display';if(c.rating==='best')cls+=' best-reveal';else if(c.rating==='partial')cls+=' partial-reveal';else cls+=' wrong-reveal';const tag=c.rating==='best'?` <span style="color:var(--green);font-weight:800">✅ ${c.xp} XP</span>`:c.rating==='partial'?` <span style="color:var(--yellow);font-weight:800">🔶 ${c.xp} XP</span>`:` <span style="color:var(--red);font-weight:800">❌ 0</span>`;return`<div class="${cls}"><span class="letter">${'ABC'[i]}.</span>${esc(c.text)}${tag}<div style="margin-top:6px;font-size:12px;color:#b8a890;border-top:1px solid rgba(255,255,255,.05);padding-top:6px">${c.feedback}</div></div>`;}).join('')}</div>`;
    if(dmBossRound<2){
      h+=`<div class="center mt-8"><button class="btn btn-sm btn-red" style="width:auto;padding:12px 28px" onclick="nextBossRound()">⚔️ Next Round →</button></div>`;
    }else{
      const won=dmBossWins>=2;
      h+=`<div class="card glow" style="text-align:center;padding:30px"><div style="font-size:48px;margin-bottom:8px">${won?'🎉👑🎉':'💀'}</div><h3 class="quest-title" style="color:${won?'var(--green)':'var(--red)'}">${won?'BOSS DEFEATED!':'BOSS SURVIVES...'}</h3><p style="font-size:14px;color:var(--dim);margin:10px 0">${won?b.victory:b.defeat}</p>${won?`<div style="font-size:16px;color:var(--gold);font-weight:800;margin:12px 0">🏆 +25 Bonus XP per member!</div>`:'<p style="font-size:12px;color:var(--dim)">You can try again from the map.</p>'}<button class="btn btn-sm mt-12" style="width:auto;padding:12px 28px" onclick="finishBoss(${won?'true':'false'})">💬 Discussion →</button></div>`;
    }
  }
  else if(dmPhase==='boss-discussion'){
    h+=`<div class="card glow" style="padding:28px"><h2 class="section center" style="color:var(--orange)">💬 Boss Debrief</h2><p style="font-size:16px;line-height:1.7;text-align:center;font-style:italic;margin-top:10px">"${b.discussion}"</p><div class="center mt-20"><button class="btn btn-sm" style="width:auto;padding:12px 28px" onclick="endBoss()">Return to Map →</button></div></div>`;
  }
  return h;
}
var dmBossRoundResults=[];
function revealBossRound(){
  const b=dmCur.boss,rd=b.rounds[dmBossRound];
  let roundWon=false;
  dmParty.forEach((p,i)=>{const ans=dmAnswers[i];if(ans!==undefined){const ch=rd.choices[ans];const ol=getLv(p.xp);p.xp+=ch.xp;if(ch.rating==='best')roundWon=true;if(getLv(p.xp)>ol)setTimeout(()=>showOL(p,getLv(p.xp)),800);}});
  if(roundWon)dmBossWins++;
  if(!dmBossRoundResults)dmBossRoundResults=[];
  dmBossRoundResults[dmBossRound]=roundWon;
  saveDM();dmPhase='round-reveal';render();window.scrollTo(0,0);
}
function nextBossRound(){dmBossRound++;dmAnswers={};dmPhase='round';render();window.scrollTo(0,0);}
function finishBoss(won){
  if(won){dmParty.forEach(p=>{p.xp+=25;const b=dmCur.boss;if(!p.cq.includes(b.id))p.cq.push(b.id);});saveDM();}
  dmPhase='boss-discussion';render();window.scrollTo(0,0);
}
function endBoss(){
  const won=dmBossWins>=2;
  if(won&&dmCur.idx===dmProgress){dmProgress++;saveDM();}
  dmCur=null;dmBossRound=0;dmBossWins=0;dmBossRoundResults=[];screen='dm-map';render();window.scrollTo(0,0);
}

function showOL(pl,lv){const o=document.getElementById('overlay');document.getElementById('overlayContent').innerHTML=`<div style="font-size:48px;margin-bottom:8px">⚔️⬆️⚔️</div><div style="font-family:'Cinzel',serif;font-size:26px;color:var(--gold);font-weight:700;margin-bottom:6px">LEVEL UP</div><div style="font-size:18px">${pl.e} ${esc(pl.n)}<br><strong style="color:var(--gold)">Level ${lv} ${LVL_N[lv]}</strong></div>`;o.classList.remove('hidden');setTimeout(()=>o.classList.add('hidden'),3500);}
function resetDM(){if(!confirm('Reset all campaign data?'))return;localStorage.removeItem(DK);dmParty=[];dmProgress=0;selClass=null;screen='dm-setup';render();}

// ===== PLAYER MODE =====
function rPCreate(){
  return`<div class="center" style="padding-top:24px;margin-bottom:20px"><div style="font-size:44px;margin-bottom:4px">⚔️🌑</div><h1 class="title" style="font-size:24px">Create Your Agent</h1></div><div class="card"><label>Name</label><input type="text" id="pn" placeholder="Your name..." maxlength="20"><label class="mt-16">Class</label><div class="class-grid">${CL.map((c,i)=>`<div class="class-card ${selClass===i?'sel':''}" onclick="selClass=${i};render()" style="${selClass===i?`border-color:${c.color};background:${c.color}18`:''}"><div class="emoji">${c.emoji}</div><div class="cname" style="color:${c.color}">${c.name}</div><div class="cdesc">${c.desc}</div></div>`).join('')}</div><button class="btn mt-20" onclick="createP()">Enter ⚔️</button></div><div class="center mt-8"><button class="btn-outline" style="font-size:10px;padding:4px 10px" onclick="screen='mode-select';mode=null;render()">← Back</button></div>`;
}
function createP(){const name=document.getElementById('pn')?.value?.trim();if(!name||selClass===null)return;const c=CL[selClass];pData={n:name,cl:c.name,e:c.emoji,c:c.color,xp:0,cq:[],sp:{},prog:0};saveP();screen='p-hub';render();}

function rPHub(){
  const p=pData,lv=getLv(p.xp),done=new Set(p.cq),us=[...new Set(QUESTS.map(q=>q.skill))];
  const prog=p.prog||0;
  let h=`<div class="card"><div class="flex gap-12"><div style="width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:linear-gradient(135deg,${p.c}22,${p.c}08);border:2px solid ${p.c}44">${p.e}</div><div class="grow"><div style="font-size:16px;font-weight:800">${esc(p.n)}</div><div style="color:${p.c};font-size:11px;font-weight:700">Lv.${lv} ${LVL_N[lv]} · ${p.cl}</div><div class="xp-track mt-8" style="height:9px"><div class="xp-fill" style="width:${xpPct(p.xp)}%;background:${p.c}"></div></div><div style="font-size:10px;color:var(--dim);margin-top:3px">${p.xp} XP · ${nxtXP(p.xp)?'Next: '+nxtXP(p.xp):'MAX'}</div></div></div></div>`;

  // Campaign progress
  h+=`<div class="card"><h2 class="section">🗺️ Campaign Progress — Node ${prog+1} of ${MAP.length}</h2><div class="xp-track mb-12" style="height:10px"><div class="xp-fill" style="width:${(prog/MAP.length)*100}%;background:var(--gold)"></div></div>`;

  // Show current quest/boss
  if(prog<MAP.length){
    const cur=nodeContent(prog);
    if(cur){
      const isBoss=cur.kind==='boss';
      h+=`<div style="text-align:center;padding:10px"><div style="font-size:${isBoss?'32':'24'}px;margin-bottom:6px">${isBoss?cur.data.emoji:'⚔️'}</div><div style="font-size:16px;font-weight:700;color:${isBoss?'var(--red)':'var(--gold)'}">${isBoss?'BOSS: '+cur.data.name:'Next: '+cur.data.title}</div>`;
      if(!isBoss){
        const q=cur.data;h+=`<div class="badge mt-8">${q.skill}</div><p style="font-size:12px;color:var(--dim);margin:10px 0">${q.story.substring(0,100)}...</p><button class="btn btn-sm btn-orange mt-8" style="width:auto;padding:10px 24px" onclick="startPQ(${prog})">Begin Quest →</button>`;
      }else{
        h+=`<p style="font-size:12px;color:var(--dim);margin:8px 0">${cur.data.desc}</p><p style="font-size:11px;color:var(--orange)">Boss battles are led by the Shadow Master on the main screen.</p>`;
      }
      h+=`</div>`;
    }
  }else{
    h+=`<div class="center" style="padding:20px"><div style="font-size:40px">👑🎉👑</div><h3 class="quest-title" style="color:var(--green)">CAMPAIGN COMPLETE!</h3></div>`;
  }
  h+=`</div>`;

  // All quests list for review
  h+=`<div class="card"><h2 class="section">📜 All Quests</h2>${QUESTS.map((q,i)=>{const d=done.has(q.id);return`<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><span style="color:${d?'var(--green)':'var(--dim)'}">${d?'✅':'🔒'}</span> ${q.title} <span style="color:var(--dim);font-size:10px">· ${q.skill}</span></div>`;}).join('')}</div>`;
  h+=`<div class="center mt-8"><button class="reset-btn" onclick="resetP()">🗑️ Reset</button> <button class="btn-outline" style="font-size:10px;padding:4px 10px;margin-left:6px" onclick="screen='mode-select';mode=null;render()">←</button></div>`;
  return h;
}

function startPQ(idx){const c=nodeContent(idx);if(!c||c.kind!=='quest')return;pQuest={idx,data:c.data};pChoice=null;pFB=false;screen='p-quest';render();window.scrollTo(0,0);}
function rPQuest(){
  const q=pQuest.data;const tb=q.type==='coop'?'<span class="badge-coop" style="margin-left:6px">🤝</span>':q.type==='gray'?'<span class="badge-gray" style="margin-left:6px">⚖️</span>':'';
  let h=`<button class="btn-outline mb-12" onclick="screen='p-hub';render()">← Back</button><div class="card"><div class="badge mb-8">${q.skill}</div>${tb}<h3 class="quest-title" style="margin-top:6px">${q.title}</h3><p style="font-size:13px;line-height:1.7;color:#b8a890">${q.story}</p></div><div class="card"><h2 class="section" style="color:var(--orange)">🎭 The Situation</h2><p style="font-size:13px;line-height:1.7;font-style:italic">${q.scenario}</p></div>`;
  h+=`<div class="card"><h2 class="section">What's your move?</h2>${q.choices.map((c,i)=>{let cls='choice-btn',ex='';if(pFB){if(pChoice===i){cls+=c.rating==='best'?' best':c.rating==='partial'?' partial':' wrong';ex=c.rating==='best'?' ✅':c.rating==='partial'?' 🔶':' ❌';}else if(c.rating==='best')cls+=' show-best';else if(c.rating==='partial'&&pChoice!==i)cls+=' show-partial';}return`<button class="${cls}" onclick="pSubmit(${i})" ${pFB?'disabled':''}><span class="letter">${'ABC'[i]}.</span>${esc(c.text)}${ex}</button>`;}).join('')}</div>`;
  if(pFB){const ch=q.choices[pChoice];const col=ch.rating==='best'?'var(--green)':ch.rating==='partial'?'var(--yellow)':'var(--red)';const ti=ch.rating==='best'?'✅ Best Move':ch.rating==='partial'?'🔶 Solid, But...':'❌ Misstep';h+=`<div class="card feedback" style="border-color:${col}44"><div style="font-size:15px;font-weight:800;color:${col}">${ti}</div><p style="font-size:12px;line-height:1.6;color:#b8a890;margin-top:6px">${ch.feedback}</p>${ch.xp>0?`<div style="margin-top:8px;padding:6px 10px;background:rgba(212,175,55,.08);border-radius:8px;font-size:12px;color:var(--gold);font-weight:700">+${ch.xp} XP</div>`:''}${q.grayNote&&ch.rating!=='wrong'?`<div class="gray-note mt-8"><strong style="color:var(--purple)">⚖️</strong> ${q.grayNote}</div>`:''}<button class="btn mt-12" onclick="screen='p-hub';render();window.scrollTo(0,0)">Continue →</button></div>`;}
  return h;
}
function pSubmit(i){if(pFB)return;pChoice=i;pFB=true;const c=pQuest.data.choices[i];const ol=getLv(pData.xp);pData.xp+=c.xp;if(!pData.cq.includes(pQuest.data.id))pData.cq.push(pQuest.data.id);if(c.rating!=='wrong')pData.sp[pQuest.data.skill]=(pData.sp[pQuest.data.skill]||0)+1;if(pQuest.idx===pData.prog)pData.prog++;saveP();if(getLv(pData.xp)>ol)setTimeout(()=>showOL(pData,getLv(pData.xp)),1200);render();setTimeout(()=>{const f=document.querySelector('.feedback');if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},100);}
function resetP(){if(!confirm('Reset everything?'))return;localStorage.removeItem(PK);pData=null;selClass=null;screen='p-create';render();}

// Shuffle choices so correct answers aren't always in the same position
function shuffleArr(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function shuffleAllChoices(){QUESTS.forEach(q=>{shuffleArr(q.choices);});BOSSES.forEach(b=>{b.rounds.forEach(r=>{shuffleArr(r.choices);});});}
document.addEventListener('DOMContentLoaded',()=>{shuffleAllChoices();stars();render();});
</script>
</body>
</html>
